<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla Mundialista 2026 - Los Pibes de la 12</title>
<style>
:root {
  --azul:#0d1b2a;--azul2:#1b2d45;--azul3:#2d4a6b;
  --verde:#2d6a4f;--verde2:#40916c;
  --dorado:#f4a827;--dorado2:#ffd166;
  --blanco:#ffffff;--gris:#8d99ae;--gris2:#c8d0e0;
  --rojo:#e63946;--exito:#06d6a0;
  --r:10px;--sombra:0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--azul);color:var(--blanco);min-height:100vh}
a,a:visited{color:var(--dorado);text-decoration:none;cursor:pointer}
input,select,textarea{font-family:inherit}
/* NAV */
nav{background:linear-gradient(135deg,var(--azul2),var(--azul3));border-bottom:3px solid var(--dorado);padding:0 14px;position:sticky;top:0;z-index:100;box-shadow:var(--sombra)}
.nav-inner{max-width:1140px;margin:auto;display:flex;align-items:center;justify-content:space-between;height:58px;gap:8px}
.nav-brand{font-size:.95rem;font-weight:800;color:var(--dorado);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.nav-links{display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end}
.nav-btn{background:transparent;border:none;color:var(--gris2);cursor:pointer;padding:5px 8px;border-radius:6px;font-size:.78rem;font-weight:600;transition:.2s;white-space:nowrap}
.nav-btn:hover,.nav-btn.activo{background:var(--dorado);color:var(--azul)}
.nav-user{font-size:.73rem;color:var(--dorado2);padding:3px 8px;border:1px solid var(--dorado);border-radius:20px;white-space:nowrap}
/* LAYOUT */
main{max-width:1140px;margin:auto;padding:18px 14px 60px}
.card{background:var(--azul2);border-radius:var(--r);padding:18px;box-shadow:var(--sombra);border:1px solid rgba(255,255,255,.06)}
.card-titulo{font-size:1.05rem;font-weight:700;color:var(--dorado);margin-bottom:14px;display:flex;align-items:center;gap:8px}
/* HERO */
.hero{text-align:center;padding:36px 18px;background:linear-gradient(135deg,var(--azul2),var(--verde));border-radius:var(--r);margin-bottom:20px;border:2px solid var(--dorado);position:relative;overflow:hidden}
.hero::before{content:'⚽';font-size:110px;position:absolute;right:-14px;top:-14px;opacity:.07;pointer-events:none}
.hero h1{font-size:clamp(1.3rem,4vw,2rem);font-weight:900;color:var(--dorado)}
.hero h2{font-size:clamp(.9rem,2.5vw,1.35rem);color:var(--blanco);margin-top:5px;font-weight:600}
.hero p{color:var(--gris2);margin-top:7px;font-size:.88rem}
.hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:9px;margin-top:18px}
.hero-stat{background:rgba(0,0,0,.3);border-radius:8px;padding:11px;border:1px solid rgba(244,168,39,.25)}
.hero-stat .num{font-size:1.6rem;font-weight:900;color:var(--dorado)}
.hero-stat .lab{font-size:.7rem;color:var(--gris2);text-transform:uppercase;letter-spacing:.4px}
/* BOTONES */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.86rem;transition:.2s;text-align:center;justify-content:center}
.btn-dorado{background:var(--dorado);color:var(--azul)}.btn-dorado:hover{background:var(--dorado2)}
.btn-verde{background:var(--verde);color:var(--blanco)}.btn-verde:hover{background:var(--verde2)}
.btn-gris{background:var(--azul3);color:var(--blanco)}.btn-gris:hover{background:var(--azul2)}
.btn-rojo{background:var(--rojo);color:var(--blanco)}.btn-rojo:hover{opacity:.85}
.btn-sm{padding:5px 10px;font-size:.76rem}
.btn-lg{padding:12px 24px;font-size:.93rem}
.btn-bloque{width:100%}
/* FORMS */
.form-grupo{margin-bottom:12px}
.form-grupo label{display:block;font-size:.76rem;font-weight:600;color:var(--gris2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.form-control{width:100%;background:var(--azul);border:1.5px solid var(--azul3);border-radius:8px;padding:9px 12px;color:var(--blanco);font-size:.91rem;transition:.2s}
.form-control:focus{outline:none;border-color:var(--dorado)}
.form-control::placeholder{color:var(--gris)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* GRIDS */
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
/* ALERTAS */
.alerta{padding:10px 14px;border-radius:8px;font-size:.86rem;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.alerta-exito{background:rgba(6,214,160,.15);border:1px solid var(--exito);color:var(--exito)}
.alerta-error{background:rgba(230,57,70,.15);border:1px solid var(--rojo);color:var(--rojo)}
.alerta-info{background:rgba(244,168,39,.12);border:1px solid var(--dorado);color:var(--dorado2)}
/* TABLAS */
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{background:rgba(0,0,0,.3);color:var(--dorado);text-align:left;padding:8px 10px;font-size:.7rem;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.05)}
tr:hover td{background:rgba(255,255,255,.02)}
.pos-1 td:first-child{color:var(--dorado);font-weight:900}
.pos-2 td:first-child{color:#c0c0c0;font-weight:700}
.pos-3 td:first-child{color:#cd7f32;font-weight:700}
/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.68rem;font-weight:700}
.badge-lider{background:var(--dorado);color:var(--azul)}
.badge-verde{background:var(--verde);color:var(--blanco)}
.badge-gris{background:var(--azul3);color:var(--gris2)}
.badge-rojo{background:var(--rojo);color:var(--blanco)}
/* PARTIDO CARD */
.partido-card{background:var(--azul);border-radius:8px;padding:12px;margin-bottom:6px;border:1px solid rgba(255,255,255,.07);transition:.2s}
.partido-card:hover{border-color:rgba(244,168,39,.35)}
.partido-info{display:flex;align-items:center;gap:7px;justify-content:space-between;flex-wrap:wrap}
.partido-equipos{display:flex;align-items:center;gap:7px;flex:1;justify-content:center;min-width:220px}
.equipo-nombre{font-weight:700;font-size:.85rem;text-align:center;flex:1}
.equipo-flag{font-size:1.1rem;line-height:1}
.marcador-inputs{display:flex;align-items:center;gap:4px}
.marcador-inputs input{width:40px;text-align:center;background:var(--azul2);border:1.5px solid var(--azul3);border-radius:6px;color:var(--blanco);padding:5px 3px;font-size:.98rem;font-weight:700}
.marcador-inputs input:focus{outline:none;border-color:var(--dorado)}
.marcador-inputs span{color:var(--gris);font-weight:700;font-size:.9rem}
.partido-meta{font-size:.7rem;color:var(--gris)}
.partido-bloqueado{opacity:.5;pointer-events:none}
.partido-jugado{border-left:3px solid var(--exito)}
.resultado-real{background:rgba(6,214,160,.12);border-radius:4px;padding:2px 7px;font-weight:700;color:var(--exito);font-size:.84rem;display:inline-block}
/* BRACKET */
.bracket-equipo{display:flex;align-items:center;gap:6px;padding:9px 11px;border-bottom:1px solid rgba(255,255,255,.06);font-size:.84rem;font-weight:600}
.bracket-equipo:last-child{border-bottom:none}
.bracket-equipo.ganador{background:rgba(244,168,39,.1);color:var(--dorado)}
.bracket-equipo .goles{font-weight:900;color:var(--dorado);margin-left:auto;padding-left:8px}
.bracket-match-card{background:var(--azul);border-radius:8px;border:1px solid var(--azul3);overflow:hidden;margin-bottom:8px}
.bracket-match-card:hover{border-color:rgba(244,168,39,.3)}
/* PROGRESO */
.progress-bar{background:var(--azul3);border-radius:20px;height:7px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--verde),var(--verde2));transition:.5s}
/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:12px;overflow-x:auto;padding-bottom:3px}
.tab{background:var(--azul);border:1px solid var(--azul3);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--gris2);transition:.2s;white-space:nowrap;flex-shrink:0}
.tab.activo,.tab:hover{background:var(--dorado);color:var(--azul);border-color:var(--dorado)}
/* ESPECIALES */
.corona{animation:flotar .8s ease-in-out infinite alternate}
@keyframes flotar{from{transform:translateY(0)}to{transform:translateY(-4px)}}
.mensaje-especial{background:linear-gradient(135deg,rgba(244,168,39,.18),rgba(6,214,160,.12));border:2px solid var(--dorado);border-radius:var(--r);padding:16px;text-align:center;margin-bottom:16px}
.admin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.admin-action{background:var(--azul);border:1px solid var(--azul3);border-radius:8px;padding:14px;cursor:pointer;text-align:center;transition:.2s}
.admin-action:hover{border-color:var(--dorado);background:rgba(244,168,39,.05)}
.admin-action .icon{font-size:1.6rem;margin-bottom:4px}
.admin-action .lbl{font-size:.78rem;font-weight:600;color:var(--gris2)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:var(--azul2);border-radius:var(--r);padding:20px;max-width:520px;width:100%;border:1px solid var(--azul3);box-shadow:var(--sombra);max-height:90vh;overflow-y:auto}
.modal-titulo{font-size:1rem;font-weight:700;color:var(--dorado);margin-bottom:12px}
.modal-acciones{display:flex;gap:7px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
/* UTILS */
@media(max-width:580px){.form-grid{grid-template-columns:1fr}.nav-btn{padding:4px 6px;font-size:.72rem}}
.hidden{display:none!important}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.flex{display:flex}.gap-8{gap:8px}.gap-6{gap:6px}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.flex-wrap{flex-wrap:wrap}.fw-700{font-weight:700}
.text-center{text-align:center}.text-dorado{color:var(--dorado)}
.text-gris{color:var(--gris)}.text-exito{color:var(--exito)}
.w-100{width:100%}.separator{border:none;border-top:1px solid rgba(255,255,255,.07);margin:12px 0}
@keyframes fadeIn{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

function eqL(e) {

  const f = BANDERAS[e];
  return f ? `${f} ${esc(e)}` : esc(e);
}
// Invertido para mostrar en columna derecha: "Nombre 🏴"

  if (!e || typeof e !== 'string') return '—';
  const f = BANDERAS[e];

// CIERRE DE APUESTAS — 11 de junio de 2026, 1:00 p.m. Colombia
// Comparaciones SIEMPRE contra este instante absoluto (UTC-5),
// independiente de la zona horaria del navegador.
// ═══════════════════════════════════════════════════════════════
const BETTING_DEADLINE = new Date('2026-06-11T13:00:00-05:00');
const DEADLINE_TEXTO = '11 de junio de 2026, 1:00 p.m. (hora Colombia)';
const TIMEZONE_POLLA = 'America/Bogota';

function apuestasCerradas() { return Date.now() >= BETTING_DEADLINE.getTime(); }
// Un usuario queda bloqueado si pasó el deadline o si ya envió su apuesta definitiva
function usuarioBloqueado(uid) { return apuestasCerradas() || !!(db.envios && db.envios[uid]); }
function envioDe(uid) { return (db.envios && db.envios[uid]) || null; }

function ahoraBogota() {
  return new Date().toLocaleString('es-CO', {timeZone:TIMEZONE_POLLA,
    day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
}

// Convierte hora ET de FIFA a hora Colombia (en junio-julio ET = UTC-4, Bogotá = UTC-5 → -1h)
function horaBogota(horaET) {
  const m = /^(\d{1,2}):(\d{2})/.exec(horaET||''); if(!m) return horaET;
  let h = parseInt(m[1]) - 1; let sufijo='';
  if (h < 0) { h += 24; sufijo=' (día ant.)'; }
  return `${String(h).padStart(2,'0')}:${m[2]} COL${sufijo}`;
}

// Checksum FNV-1a sobre el JSON de la predicción — trazabilidad del soporte
function checksumStr(s) {
  let h = 0x811c9dc5;
  for (let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = (h*0x01000193)>>>0; }
  return h.toString(16).padStart(8,'0').toUpperCase();
}
function checksumPrediccion(uid) {
  return checksumStr(JSON.stringify({
    g: db.pronosticosGrupos[uid]||{},
    e: db.pronosticosElim[uid]||{},
  }));
}

}

function registrar(nombre,apodo,email,pw) {
  if (apuestasCerradas()) return {ok:false,msg:'Las apuestas cerraron el '+DEADLINE_TEXTO+'. Ya no es posible registrarse.'};
  nombre=nombre.trim(); apodo=apodo.trim();
  if (!nombre) return {ok:false,msg:'El nombre es obligatorio'};
  email=(email||'').trim();
  if (email && db.participantes.find(p=>(p.email||'').toLowerCase()===email.toLowerCase()))
    return {ok:false,msg:'Ya existe un participante con ese correo'};
  if (!pw||pw.length<4) return {ok:false,msg:'La contraseña debe tener al menos 4 caracteres'};
  if (db.participantes.find(p=>p.nombre.toLowerCase()===nombre.toLowerCase()))
    return {ok:false,msg:'Ya existe un participante con ese nombre'};
  const id='U'+Date.now()+Math.random().toString(36).slice(2,5);
  db.participantes.push({id,nombre,apodo:apodo||nombre,email:email.trim(),pw,
    inscripcion:new Date().toISOString()});
  guardarDB();
  return {ok:true,usuario:{id,nombre,apodo:apodo||nombre,email:email.trim()}};
}

function loginFn(nombre,pw) {
  const p=db.participantes.find(u=>u.nombre.toLowerCase()===nombre.trim().toLowerCase()&&u.pw===pw);
  if(!p) return {ok:false,msg:'Nombre o contraseña incorrectos'};
  return {ok:true,usuario:{id:p.id,nombre:p.nombre,apodo:p.apodo,email:p.email}};
}

// ═══════════════════════════════════════════════════════════════
// CÁLCULO DE TABLA DE GRUPO — criterios de desempate FIFA
// (Art. 13 Reglamento: pts → enfrentamientos directos entre
//  empatados [pts, DG, GF] → DG total → GF total. Fair play y
//  ranking FIFA no están disponibles en la app: se usa orden
//  alfabético como criterio determinista final, documentado.)
// ═══════════════════════════════════════════════════════════════
function calcTablaGrupoGenerico(gid, getResultado) {
  const t={};
  GRUPOS[gid].equipos.forEach(e=>{t[e]={e,pts:0,j:0,g:0,em:0,p:0,gf:0,gc:0,dg:0};});
  const partidos=PARTIDOS_GRUPOS.filter(p=>p.grupo===gid);
  partidos.forEach(p=>{
    const r=getResultado(p); if(!r) return;
    const {local:gl,visitante:gv}=r;
    const loc=t[p.equipoLocal],vis=t[p.equipoVisitante];
    if(!loc||!vis) return;
    loc.j++;vis.j++;loc.gf+=gl;loc.gc+=gv;vis.gf+=gv;vis.gc+=gl;
    loc.dg=loc.gf-loc.gc; vis.dg=vis.gf-vis.gc;
    if(gl>gv){loc.g++;loc.pts+=3;vis.p++;}
    else if(gl<gv){vis.g++;vis.pts+=3;loc.p++;}
    else{loc.em++;loc.pts++;vis.em++;vis.pts++;}
  });
  // 1) Orden inicial por puntos
  let tabla=Object.values(t).sort((a,b)=>b.pts-a.pts);
  // 2) Resolver clústeres de empate en puntos con enfrentamientos directos
  const resultado=[];
  let i=0;
  while(i<tabla.length){
    let j=i; while(j<tabla.length&&tabla[j].pts===tabla[i].pts) j++;
    const cluster=tabla.slice(i,j);
    if(cluster.length>1){
      const nombres=new Set(cluster.map(c=>c.e));
      // mini-tabla solo con partidos entre los empatados
      const mini={}; cluster.forEach(c=>{mini[c.e]={pts:0,dg:0,gf:0};});
      partidos.forEach(p=>{
        if(!nombres.has(p.equipoLocal)||!nombres.has(p.equipoVisitante)) return;
        const r=getResultado(p); if(!r) return;
        const {local:gl,visitante:gv}=r;
        mini[p.equipoLocal].gf+=gl; mini[p.equipoLocal].dg+=gl-gv;
        mini[p.equipoVisitante].gf+=gv; mini[p.equipoVisitante].dg+=gv-gl;
        if(gl>gv) mini[p.equipoLocal].pts+=3;
        else if(gl<gv) mini[p.equipoVisitante].pts+=3;
        else {mini[p.equipoLocal].pts++; mini[p.equipoVisitante].pts++;}
      });
      cluster.sort((a,b)=>
        mini[b.e].pts-mini[a.e].pts || mini[b.e].dg-mini[a.e].dg || mini[b.e].gf-mini[a.e].gf ||
        b.dg-a.dg || b.gf-a.gf || a.e.localeCompare(b.e));
    }
    resultado.push(...cluster);
    i=j;
  }
  return resultado;
}

function calcTablaGrupo(uid, gid) {
  return calcTablaGrupoGenerico(gid, p=>getPGrupo(uid,p.id));
}

// ═══════════════════════════════════════════════════════════════
// CLASIFICADOS (1°, 2° de cada grupo + 8 mejores terceros)
// ═══════════════════════════════════════════════════════════════
function calcClasificados(uid) {
  const res={primeros:{},segundos:{},terceros:[]};
  Object.keys(GRUPOS).forEach(g=>{
    // ── Solo usar la tabla si el usuario pronosticó al menos 1 partido de este grupo
    const tienePronos = PARTIDOS_GRUPOS.filter(p=>p.grupo===g).some(p=>getPGrupo(uid,p.id)!==null);
    if (!tienePronos) {
      res.primeros[g]=null;
      res.segundos[g]=null;
      return; // este grupo queda pendiente en el bracket
    }
    const tb=calcTablaGrupo(uid,g);
    res.primeros[g]=tb[0]?.e||null;
    res.segundos[g]=tb[1]?.e||null;
    // Solo agregar tercero si tiene puntos o partidos jugados en sus pronósticos
    if(tb[2] && tb[2].j>0) res.terceros.push({...tb[2],grupo:g});
  });
  // Criterios FIFA para ranking de terceros: pts → DG → GF → alfabético (determinista)
  res.terceros.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.e.localeCompare(b.e));
  res.mejoresTerceros=res.terceros.slice(0,8);
  return res;
}

// ═══════════════════════════════════════════════════════════════
// ASIGNACIÓN DE MEJORES TERCEROS A LOS CRUCES (Anexo C FIFA)
// Cada partido con slot '3:XXXXX' solo admite terceros de esos
// grupos. Se asignan los 8 clasificados respetando todas las
// restricciones mediante backtracking (slots con menos opciones
// primero, terceros en orden de ranking).
// ═══════════════════════════════════════════════════════════════
function asignarTerceros(mejoresTerceros) {
  if (!mejoresTerceros || mejoresTerceros.length < 8) return null;
  const slots = PARTIDOS_ELIMINATORIAS
    .filter(p=>p.slot2.startsWith('3:'))
    .map(p=>({id:p.id, permitidos:p.slot2.slice(2)}));
  const tercerosOcho = mejoresTerceros.slice(0,8);
  // Slots más restringidos primero, para que el backtracking converja
  const orden = slots.map((s,i)=>({...s,
    opciones: tercerosOcho.filter(t=>s.permitidos.includes(t.grupo)).length}))
    .sort((a,b)=>a.opciones-b.opciones);
  const usado = new Array(8).fill(false);
  const asign = {};
  function bt(i) {
    if (i === orden.length) return true;
    const s = orden[i];
    for (let j=0;j<8;j++) {
      if (usado[j] || !s.permitidos.includes(tercerosOcho[j].grupo)) continue;
      usado[j]=true; asign[s.id]=tercerosOcho[j].e;
      if (bt(i+1)) return true;
      usado[j]=false; delete asign[s.id];
    }
    return false;
  }
  return bt(0) ? asign : null;
}

// ═══════════════════════════════════════════════════════════════
// RESOLUCIÓN DE SLOTS DEL BRACKET (predicción del usuario)
// Devuelve el nombre del equipo, o null si aún no se puede resolver
// ═══════════════════════════════════════════════════════════════
function resolverSlot(slot, uid, matchId) {
  if (/^[12][A-L]$/.test(slot)) {
    const clas=calcClasificados(uid);
    return slot[0]==='1' ? (clas.primeros[slot[1]]||null) : (clas.segundos[slot[1]]||null);
  }
  if (slot.startsWith('3:')) {
    const clas=calcClasificados(uid);
    const asig=asignarTerceros(clas.mejoresTerceros);
    return asig ? (asig[matchId]||null) : null;
  }
  let m;
  if ((m=/^W(\d+)$/.exec(slot))) return resolverGanador('M'+m[1],uid,false);
  if ((m=/^L(\d+)$/.exec(slot))) return resolverGanador('M'+m[1],uid,true);
  return null;
}

// Ganador (o perdedor) de un partido eliminatorio según pronóstico.
// null si falta pronóstico o si los equipos de rondas previas no existen aún.
function resolverGanador(matchId, uid, perdedor) {
  const match=PARTIDOS_ELIMINATORIAS.find(m=>m.id===matchId);
  if (!match) return null;
  const e1=resolverSlot(match.slot1,uid,matchId);
  const e2=resolverSlot(match.slot2,uid,matchId);
  if (!e1||!e2) return null;
  const pron=getPElim(uid,matchId);
  if (!pron||!pron.ganador) return null;
  if (perdedor) return pron.ganador==='local'?e2:e1;
  return pron.ganador==='local'?e1:e2;
}

// ═══════════════════════════════════════════════════════════════
// RESOLUCIÓN DEL BRACKET REAL (resultados del admin)
// Mismas reglas, alimentadas por db.resultadosReales
// ═══════════════════════════════════════════════════════════════
function resolverSlotReal(slot, matchId) {
  if (/^[12][A-L]$/.test(slot)) {
    const clas=calcClasificadosReales();
    return slot[0]==='1' ? (clas.primeros[slot[1]]||null) : (clas.segundos[slot[1]]||null);
  }
  if (slot.startsWith('3:')) {
    const clas=calcClasificadosReales();
    const asig=asignarTerceros(clas.mejoresTerceros);
    return asig ? (asig[matchId]||null) : null;
  }
  let m;
  if ((m=/^W(\d+)$/.exec(slot))) return resolverGanadorReal('M'+m[1],false);
  if ((m=/^L(\d+)$/.exec(slot))) return resolverGanadorReal('M'+m[1],true);
  return null;
}

function resolverGanadorReal(matchId, perdedor) {
  const match=PARTIDOS_ELIMINATORIAS.find(m=>m.id===matchId);
  if (!match) return null;
  const e1=resolverSlotReal(match.slot1,matchId);
  const e2=resolverSlotReal(match.slot2,matchId);
  if (!e1||!e2) return null;
  const real=db.resultadosReales[matchId];
  if (!real) return null;
  // En eliminatorias un empate exige ganador definido (penales)
  let gan=real.ganador;
  if (gan==='empate'||!gan) {
    if (real.local>real.visitante) gan='local';
    else if (real.visitante>real.local) gan='visitante';
    else return null; // empate sin definición de penales → no resoluble
  }
  if (perdedor) return gan==='local'?e2:e1;
  return gan==='local'?e1:e2;
}

// ═══════════════════════════════════════════════════════════════
// TABLA CLASIFICADOS REALES (basada en resultados del admin)
// Solo cuenta un grupo cuando sus 6 partidos tienen resultado final
// — evita clasificar equipos con la fase de grupos a medias.
// ═══════════════════════════════════════════════════════════════
function calcClasificadosReales() {
  const res={primeros:{},segundos:{},terceros:[],mejoresTerceros:[]};
  Object.keys(GRUPOS).forEach(g=>{
    const partidos=PARTIDOS_GRUPOS.filter(p=>p.grupo===g);
    const completo=partidos.every(p=>!!db.resultadosReales[p.id]);
    if(!completo) return;
    const tabla=calcTablaGrupoGenerico(g, p=>db.resultadosReales[p.id]);
    res.primeros[g]=tabla[0]?.e;
    res.segundos[g]=tabla[1]?.e;
    if(tabla[2]) res.terceros.push({...tabla[2],grupo:g});
  });
  // Mismos criterios FIFA para ordenar terceros: pts → DG → GF → alfabético
  res.terceros.sort((a,b)=>b.pts-a.pts||b.dg-a.dg||b.gf-a.gf||a.e.localeCompare(b.e));
  // Solo asigna los 8 mejores cuando los 12 grupos están completos
  if(Object.keys(res.primeros).length===12) res.mejoresTerceros=res.terceros.slice(0,8);
  return res;
}

// ═══════════════════════════════════════════════════════════════
// RECALCULAR PUNTAJES
// ═══════════════════════════════════════════════════════════════
function recalcularPuntajes() {
  const cfg=db.config?.puntajes||CFG_DEFAULT.puntajes;
  const clasReales=calcClasificadosReales();
  db.ranking=db.participantes.map(part=>{
    let pts=0,mExactos=0,rOk=0,cOk=0,campeonOk=false,subOk=false,terceroOk=false;

    // Fase de grupos
    PARTIDOS_GRUPOS.forEach(p=>{
      const real=db.resultadosReales[p.id]; if(!real) return;
      const pron=getPGrupo(part.id,p.id); if(!pron) return;
      const {local:rl,visitante:rv}=real,{local:pl,visitante:pv}=pron;
      if(pl===rl&&pv===rv){
        pts+=cfg.marcadorExacto+cfg.diferenciaGol; mExactos++; rOk++;
      } else {
        const rr=rl>rv?'L':rl<rv?'V':'E', rp=pl>pv?'L':pl<pv?'V':'E';
        if(rr===rp){
          pts+=cfg.resultadoCorrecto; rOk++;
          if((rl-rv)===(pl-pv)) pts+=cfg.diferenciaGol;
        }
      }
    });

    // Clasificados a dieciseisavos
    if(Object.keys(clasReales.primeros).length>0){
      const clasPron=calcClasificados(part.id);
      Object.keys(GRUPOS).forEach(g=>{
        if(clasReales.primeros[g]&&clasPron.primeros[g]===clasReales.primeros[g]){pts+=cfg.clasificadoGrupos;cOk++;}
        if(clasReales.segundos[g]&&clasPron.segundos[g]===clasReales.segundos[g]){pts+=cfg.clasificadoGrupos;cOk++;}
      });
      const tp=(clasPron.mejoresTerceros||[]).map(t=>t.e);
      (clasReales.mejoresTerceros||[]).forEach(t=>{if(tp.includes(t.e)){pts+=cfg.clasificadoGrupos;cOk++;}});
    }

    // Eliminatorias
    const fpPts={dieciseisavos:cfg.avanceDieciseisavos,octavos:cfg.avanceOctavos,
      cuartos:cfg.avanceCuartos,semifinal:cfg.avanceSemis};
    // Se compara el EQUIPO que avanza, no la etiqueta local/visitante:
    // el bracket del apostador puede tener equipos distintos al real.
    PARTIDOS_ELIMINATORIAS.forEach(p=>{
      const ganReal=resolverGanadorReal(p.id,false); if(!ganReal) return;
      const ganPron=resolverGanador(p.id,part.id,false);
      if(p.fase==='tercerPuesto'){
        if(ganPron&&ganPron===ganReal){pts+=cfg.tercerPuesto;terceroOk=true;}
        return;
      }
      if(p.fase==='final'){
        if(ganPron&&ganPron===ganReal){pts+=cfg.campeon;campeonOk=true;}
        const subReal=resolverGanadorReal(p.id,true);
        const subPron=resolverGanador(p.id,part.id,true);
        if(subPron&&subReal&&subPron===subReal){pts+=cfg.subcampeon;subOk=true;}
        return;
      }
      if(fpPts[p.fase]&&ganPron&&ganPron===ganReal) pts+=fpPts[p.fase];
    });

    return {id:part.id,nombre:part.nombre,apodo:part.apodo,pts,
      marcadoresExactos:mExactos,resultadosOk:rOk,clasificadosOk:cOk,
      campeonOk,subcampeonOk:subOk,terceroOk,actualizado:new Date().toISOString()};
  });
  db.ranking.sort((a,b)=>b.pts-a.pts||b.marcadoresExactos-a.marcadoresExactos||b.resultadosOk-a.resultadosOk||b.clasificadosOk-a.clasificadosOk||a.nombre.localeCompare(b.nombre));
  guardarDB();
}

function progreso(uid) {
  const tG=PARTIDOS_GRUPOS.length, tE=PARTIDOS_ELIMINATORIAS.length;
  const pG=Object.keys(db.pronosticosGrupos[uid]||{}).length;
  const pE=Object.keys(db.pronosticosElim[uid]||{}).length;
  return {total:tG+tE,completos:pG+pE,pct:Math.round(((pG+pE)/(tG+tE))*100),pG,pE,tG,tE};
}

// Banner de estado de la apuesta (cierre / enviada / tiempo restante)
function bannerEstadoApuesta(uid) {
  const env=envioDe(uid);
  if (env) return `<div class="alerta alerta-exito mb-8" style="font-size:.8rem">
    📤 <strong>Apuesta enviada y bloqueada.</strong> ID: ${esc(env.id)} · Checksum: ${esc(env.checksum)} · ${esc(env.submittedAtBogota||'')}</div>`;
  if (apuestasCerradas()) return `<div class="alerta alerta-error mb-8" style="font-size:.8rem">
    🔒 <strong>Ventana de apuestas cerrada</strong> (${DEADLINE_TEXTO}). Ya no se pueden crear ni modificar pronósticos.</div>`;
  const ms=BETTING_DEADLINE.getTime()-Date.now();
  const h=Math.floor(ms/3600000), min=Math.floor((ms%3600000)/60000);
  return `<div class="alerta alerta-info mb-8" style="font-size:.8rem">
    ⏳ <strong>Cierre de apuestas:</strong> ${DEADLINE_TEXTO} — faltan ${h}h ${min}min. Después del cierre no habrá cambios.</div>`;
}

      <div class="form-grupo"><label>Correo (opcional)</label><input class="form-control" id="rEmail" type="email" placeholder="tu@correo.com"></div>
      <div class="form-grupo"><label>Contraseña * (mín. 4 caracteres)</label><input class="form-control" id="rPw" type="password" placeholder="••••••"></div>
      <button class="btn btn-verde btn-bloque btn-lg mt-8" onclick="doRegistro()">Crear cuenta</button>
      <hr class="separator">
      <p class="text-center text-gris" style="font-size:.82rem">¿Ya tienes cuenta? <a onclick="navegar('login')">Ingresa aquí</a></p>
    </div>
  </div>`;
}

function doRegistro() {
  const r=registrar(document.getElementById('rNom').value,document.getElementById('rApo').value,
    document.getElementById('rEmail').value,document.getElementById('rPw').value);
  if(!r.ok){document.getElementById('regAlert').innerHTML=`<div class="alerta alerta-error">❌ ${esc(r.msg)}</div>`;return;}
  ST.usuario=r.usuario; guardarSesion(r.usuario); navegar('perfil');
}

// VISTA: FASE DE GRUPOS
// ═══════════════════════════════════════════════════════════════
function renderGrupos() {
  if(!ST.usuario) return renderLogin();
  const u=ST.usuario, g=ST.grupo;
  const partidos=PARTIDOS_GRUPOS.filter(p=>p.grupo===g);
  const tabla=calcTablaGrupo(u.id,g);

  const tabs=Object.keys(GRUPOS).map(k=>`
    <div class="tab ${ST.grupo===k?'activo':''}" onclick="ST.grupo='${k}';renderApp()">
      ${k} <span style="font-size:.65rem">${GRUPOS[k].equipos.map(e=>fl(e)).join('')}</span>
    </div>`).join('');

  const listaEquipos=GRUPOS[g].equipos.map(e=>`${fl(e)} ${esc(e)}`).join(' &nbsp;·&nbsp; ');

  const matchDay={};
  partidos.forEach(p=>{ const d=p.fecha; if(!matchDay[d]) matchDay[d]=[]; matchDay[d].push(p); });

  let partidosHTML='';
  Object.keys(matchDay).sort().forEach(fecha=>{
    partidosHTML+=`<div style="font-size:.72rem;font-weight:700;color:var(--gris2);text-transform:uppercase;letter-spacing:.4px;margin:10px 0 5px">
      📅 ${fmtF(fecha)}</div>`;
    matchDay[fecha].forEach(p=>{
      const pron=getPGrupo(u.id,p.id);
      const real=db.resultadosReales[p.id];
      const bloq=p.estado==='bloqueado'||!!real||usuarioBloqueado(u.id);
      const jaGuardado=!!pron&&!real;
      partidosHTML+=`<div class="partido-card ${real?'partido-jugado':''} ${bloq?'partido-bloqueado':''}">
        <div class="partido-info">
          <div class="partido-meta" style="min-width:62px">
            <div style="font-size:.68rem;color:var(--gris2);font-weight:700">${horaBogota(p.hora)}</div>
            <div style="font-size:.62rem;color:var(--gris)">${p.hora}</div>
          </div>
          <div class="partido-equipos">
            <div class="equipo-nombre" style="text-align:right">
              <span class="equipo-flag">${fl(p.equipoLocal)}</span>
              <span style="margin-left:4px">${esc(p.equipoLocal)}</span>
            </div>
            <div class="marcador-inputs">
              <input type="number" min="0" max="20" value="${pron?pron.local:''}" id="gl-${p.id}" placeholder="0"
                ${bloq?'disabled':''}
                onchange="guardarPGrupo('${u.id}','${p.id}',this.value,document.getElementById('gv-${p.id}').value||0)"
                oninput="guardarPGrupo('${u.id}','${p.id}',this.value,document.getElementById('gv-${p.id}').value||0)">
              <span>:</span>
              <input type="number" min="0" max="20" value="${pron?pron.visitante:''}" id="gv-${p.id}" placeholder="0"
                ${bloq?'disabled':''}
                onchange="guardarPGrupo('${u.id}','${p.id}',document.getElementById('gl-${p.id}').value||0,this.value)"
                oninput="guardarPGrupo('${u.id}','${p.id}',document.getElementById('gl-${p.id}').value||0,this.value)">
            </div>
            <div class="equipo-nombre">
              <span style="margin-right:4px">${esc(p.equipoVisitante)}</span>
              <span class="equipo-flag">${fl(p.equipoVisitante)}</span>
            </div>
          </div>
          <div class="partido-meta" style="min-width:55px;text-align:right">
            ${real?`<span class="resultado-real">${real.local}-${real.visitante}</span>`:''}
            <span id="ok-${p.id}" style="display:${jaGuardado?'inline':'none'};font-size:.75rem;color:var(--exito)">✅</span>
            ${bloq&&!real?`<span style="font-size:.68rem;color:var(--rojo)">🔒</span>`:''}
          </div>
        </div>
        <div style="font-size:.68rem;color:var(--gris);margin-top:4px">📍 ${p.sede}</div>
      </div>`;
    });
  });

  // Tabla proyectada
  const tablaHTML=`<div style="overflow-x:auto"><table>
    <thead><tr><th>Equipo</th><th>J</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th></tr></thead>
    <tbody>${tabla.map((e,i)=>`<tr class="${i<2?'pos-'+(i+1):''}">
      <td style="font-weight:${i<2?700:400};white-space:nowrap">
        ${fl(e.e)} ${esc(e.e)} ${i<2?'<span class="badge badge-verde">✓</span>':i===2?'<span class="badge badge-gris" title="Posible mejor tercero">3°</span>':''}
      </td>
      <td>${e.j}</td><td>${e.g}</td><td>${e.em}</td><td>${e.p}</td>
      <td>${e.gf}</td><td>${e.gc}</td>
      <td style="color:${e.dg>0?'var(--exito)':e.dg<0?'var(--rojo)':'inherit'}">${e.dg>0?'+':''}${e.dg}</td>
      <td style="font-weight:700;color:var(--dorado)">${e.pts}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;

  // Clasificados proyectados del usuario
  const clas=calcClasificados(u.id);
  const priG=clas.primeros[g], segG=clas.segundos[g];
  const resumenClasif=priG||segG?`<div style="margin-top:10px;padding:10px;background:var(--azul);border-radius:8px;font-size:.82rem">
    <div style="font-weight:700;color:var(--gris2);margin-bottom:5px;text-transform:uppercase;font-size:.7rem;letter-spacing:.4px">Clasificarían según tus pronósticos:</div>
    ${priG?`<div style="margin-bottom:3px">🥇 ${fl(priG)} <strong>${esc(priG)}</strong></div>`:''}
    ${segG?`<div>🥈 ${fl(segG)} <strong>${esc(segG)}</strong></div>`:''}
  </div>`:'';

  return bannerEstadoApuesta(u.id)+`<div class="card">
    <div class="card-titulo" style="justify-content:space-between;flex-wrap:wrap;gap:6px">
      <span>⚽ Pronósticos — ${GRUPOS[g].nombre}</span>

    <div class="tabs">${tabs}</div>
    <div style="font-size:.8rem;color:var(--gris2);margin-bottom:12px">${listaEquipos}</div>
    <div class="grid-2" style="gap:16px;align-items:start">
      <div>${partidosHTML}</div>
      <div>
        <h3 style="font-size:.78rem;color:var(--gris2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">📊 Tabla según tus pronósticos</h3>
        ${tablaHTML}
        ${resumenClasif}
        <div class="alerta alerta-info mt-8" style="font-size:.74rem">
          Los 2 primeros de cada grupo clasifican a dieciseisavos.<br>
          Los 8 mejores terceros también avanzan (total: 32 equipos).
        </div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// VISTA: BRACKET ELIMINATORIO
// ═══════════════════════════════════════════════════════════════
function renderBracket() {
  if(!ST.usuario) return renderLogin();
  const u=ST.usuario;
  const prog=progreso(u.id);
  if(prog.pG<6) return `<div class="card text-center">
    <div style="font-size:3rem">⚠️</div>
    <h2 style="color:var(--dorado);margin:8px 0">Completa primero la Fase de Grupos</h2>
    <p class="text-gris" style="margin-bottom:14px">Necesitas al menos 6 pronósticos de grupos para activar el bracket</p>
    <button class="btn btn-dorado" onclick="navegar('grupos')">Ir a Fase de Grupos</button>
  </div>`;

  // ── Decodifica un slot a texto legible ─────────────────────────
  function descSlot(slot) {
    if (/^1[A-L]$/.test(slot)) return `1° Grupo ${slot[1]}`;
    if (/^2[A-L]$/.test(slot)) return `2° Grupo ${slot[1]}`;
    if (slot.startsWith('3:')) return `3° de ${slot.slice(2).split('').join('/')}`;
    let m;
    if ((m=/^W(\d+)$/.exec(slot))) return `Ganador Partido ${m[1]}`;
    if ((m=/^L(\d+)$/.exec(slot))) return `Perdedor Partido ${m[1]}`;
    return slot;
  }

  // ── Resumen clasificados por grupo ─────────────────────────────
  const clas=calcClasificados(u.id);
  const totalGruposConPronos=Object.keys(GRUPOS).filter(g=>
    PARTIDOS_GRUPOS.filter(p=>p.grupo===g).some(p=>getPGrupo(u.id,p.id)!==null)
  ).length;
  const resumenGlobal=`<div class="card mb-16">
    <div class="card-titulo" style="justify-content:space-between;flex-wrap:wrap;gap:5px">
      <span>🗂️ Clasificados Proyectados</span>
      <span style="font-size:.72rem;color:var(--gris2);font-weight:400">${totalGruposConPronos} de 12 grupos pronosticados</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">
      ${Object.keys(GRUPOS).map(g=>{
        const p1=clas.primeros[g], p2=clas.segundos[g];
        const hayPronos=PARTIDOS_GRUPOS.filter(p=>p.grupo===g).some(p=>getPGrupo(u.id,p.id)!==null);
        return `<div style="background:var(--azul);border-radius:7px;padding:9px 11px;border:1px solid ${hayPronos?'rgba(6,214,160,.2)':'rgba(255,255,255,.06)'}">
          <div style="font-size:.68rem;color:var(--dorado);font-weight:700;margin-bottom:5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between">
            <span>Grupo ${g}</span>
            ${hayPronos?'<span style="color:var(--exito);font-size:.65rem">✓ Con pronós.</span>':'<span style="color:var(--gris);font-size:.65rem">⏳ Pendiente</span>'}
          </div>
          <div style="font-size:.82rem;font-weight:700;margin-bottom:3px">${p1?`🥇 ${fl(p1)} ${esc(p1)}`:'<span style="color:var(--gris);font-size:.75rem">— Sin pronósticos —</span>'}</div>
          <div style="font-size:.82rem">${p2?`🥈 ${fl(p2)} ${esc(p2)}`:'<span style="color:var(--gris);font-size:.75rem">—</span>'}</div>
        </div>`;
      }).join('')}
    </div>
    ${clas.mejoresTerceros.length>0?`
    <div style="margin-top:10px">
      <div style="font-size:.7rem;color:var(--gris2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">⭐ 8 Mejores Terceros clasificados:</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${clas.mejoresTerceros.map((t,i)=>`
          <span style="background:rgba(244,168,39,.1);border:1px solid rgba(244,168,39,.3);border-radius:6px;padding:3px 9px;font-size:.78rem;font-weight:600">
            ${i+1}. ${fl(t.e)} ${esc(t.e)} <span style="color:var(--gris);font-size:.7rem">Grp ${t.grupo} · ${t.pts}pts</span>
          </span>`).join('')}
      </div>
    </div>`:''}
  </div>`;

  // ── Tabs de fase ───────────────────────────────────────────────
  const faseTabs=[
    {k:'dieciseisavos',l:'16avos (R32)'},{k:'octavos',l:'Octavos'},{k:'cuartos',l:'Cuartos'},
    {k:'semifinal',l:'Semis'},{k:'tercerPuesto',l:'3er Puesto'},{k:'final',l:'Final 🏆'},
  ];
  const tabs=faseTabs.map(f=>`<div class="tab ${ST.tab===f.k?'activo':''}" onclick="ST.tab='${f.k}';renderApp()">${f.l}</div>`).join('');
  const partidos=PARTIDOS_ELIMINATORIAS.filter(p=>p.fase===ST.tab);

  // ── Render de cada partido ─────────────────────────────────────
  const partHTML=partidos.map(p=>{
    const e1r=resolverSlot(p.slot1,u.id,p.id);
    const e2r=resolverSlot(p.slot2,u.id,p.id);
    const e1=e1r&&TODOS_EQUIPOS.has(e1r)?e1r:null;
    const e2=e2r&&TODOS_EQUIPOS.has(e2r)?e2r:null;
    const pron=getPElim(u.id,p.id);
    const real=db.resultadosReales[p.id];
    const bloq=p.estado==='bloqueado'||!!real||usuarioBloqueado(u.id);
    const ambosKnown=!!e1&&!!e2;
    const ganadorAct=pron?.ganador;

    // ── Cabecera del partido ──────────────────────────────────────
    const cabecera=`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:5px;margin-bottom:10px">
      <div style="font-size:.7rem;color:var(--gris)">📍 ${p.sede} &nbsp;·&nbsp; 📅 ${fmtF(p.fecha)} &nbsp;⏰ ${horaBogota(p.hora)} <span style="opacity:.6">(${p.hora})</span> &nbsp;·&nbsp; <span style="color:var(--dorado2)">Partido ${p.num}</span></div>
      <div>
        ${real?'<span class="badge badge-verde">Jugado</span>':''}
        ${bloq&&!real?'<span class="badge badge-rojo">🔒 Bloqueado</span>':''}
        ${pron&&!bloq&&ambosKnown?'<span class="badge badge-gris">✅ Guardado</span>':''}
      </div>
    </div>`;

    // ── Caso: ambos equipos conocidos ──────────────────────────────
    if (ambosKnown) {
      return `<div class="card mb-16 ${bloq&&!real?'partido-bloqueado':''}">
        ${cabecera}
        <div style="display:flex;align-items:stretch;gap:0;background:var(--azul);border-radius:9px;overflow:hidden;margin-bottom:12px;border:1px solid var(--azul3)">
          <div style="flex:1;padding:13px 14px;display:flex;flex-direction:column;align-items:flex-end;gap:4px;
            ${ganadorAct==='local'?'background:rgba(6,214,160,.08);border-right:2px solid var(--exito)':'border-right:1px solid var(--azul3)'}">
            <div style="font-size:1.6rem">${fl(e1)}</div>
            <div style="font-weight:800;font-size:.92rem;text-align:right">${esc(e1)}</div>
            ${ganadorAct==='local'?'<span class="badge badge-verde">Avanza ✓</span>':''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 14px;gap:6px;min-width:100px">
            <div style="font-size:.68rem;color:var(--gris);text-transform:uppercase;letter-spacing:.3px">Marcador</div>
            <div class="marcador-inputs">
              <input type="number" min="0" max="20" value="${pron?pron.local:''}" id="el-${p.id}" placeholder="0"
                ${bloq?'disabled':''} style="width:46px;font-size:1.1rem">
              <span style="font-size:1.1rem">:</span>
              <input type="number" min="0" max="20" value="${pron?pron.visitante:''}" id="ev-${p.id}" placeholder="0"
                ${bloq?'disabled':''} style="width:46px;font-size:1.1rem">
            </div>
            ${real?`<span class="resultado-real" style="font-size:.82rem">Real: ${real.local}-${real.visitante}</span>`:''}
          </div>
          <div style="flex:1;padding:13px 14px;display:flex;flex-direction:column;align-items:flex-start;gap:4px;
            ${ganadorAct==='visitante'?'background:rgba(6,214,160,.08);border-left:2px solid var(--exito)':'border-left:1px solid var(--azul3)'}">
            <div style="font-size:1.6rem">${fl(e2)}</div>
            <div style="font-weight:800;font-size:.92rem">${esc(e2)}</div>
            ${ganadorAct==='visitante'?'<span class="badge badge-verde">Avanza ✓</span>':''}
          </div>
        </div>
        <div style="margin-bottom:10px">
          <div style="font-size:.78rem;color:var(--gris2);font-weight:700;margin-bottom:7px">
            ${p.fase==='tercerPuesto'?'¿Quién gana el partido por el 3er puesto?':'¿Quién avanza? (empate → define por penales)'}
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:.86rem;padding:7px 12px;border-radius:7px;border:1.5px solid ${ganadorAct==='local'?'var(--exito)':'var(--azul3)'};background:${ganadorAct==='local'?'rgba(6,214,160,.08)':'transparent'};transition:.2s">
              <input type="radio" name="gan-${p.id}" value="local" ${ganadorAct==='local'?'checked':''} ${bloq?'disabled':''}
                onchange="previewGanador('${p.id}','local')">
              ${fl(e1)} <strong>${esc(e1)}</strong>
            </label>
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:.86rem;padding:7px 12px;border-radius:7px;border:1.5px solid ${ganadorAct==='visitante'?'var(--exito)':'var(--azul3)'};background:${ganadorAct==='visitante'?'rgba(6,214,160,.08)':'transparent'};transition:.2s">
              <input type="radio" name="gan-${p.id}" value="visitante" ${ganadorAct==='visitante'?'checked':''} ${bloq?'disabled':''}
                onchange="previewGanador('${p.id}','visitante')">
              ${fl(e2)} <strong>${esc(e2)}</strong>
            </label>
          </div>
        </div>
        ${!bloq?`<button class="btn btn-verde btn-sm" onclick="guardarElim('${u.id}','${p.id}')">💾 Guardar pronóstico</button>`:''}
      </div>`;
    }

    // ── Caso: uno o ambos equipos pendientes ──────────────────────
    const slot1Desc=e1?`${fl(e1)} <strong>${esc(e1)}</strong>`:`<span style="color:var(--gris)">⏳ ${esc(descSlot(p.slot1))}</span>`;
    const slot2Desc=e2?`${fl(e2)} <strong>${esc(e2)}</strong>`:`<span style="color:var(--gris)">⏳ ${esc(descSlot(p.slot2))}</span>`;
    // Calcular qué grupos faltan pronosticar para habilitar este partido
    const gruposFaltantes=[];
    [p.slot1,p.slot2].forEach(sl=>{
      if (/^[12]([A-L])$/.test(sl)) {
        const g=sl[1];
        const hayPronos=PARTIDOS_GRUPOS.filter(q=>q.grupo===g).some(q=>getPGrupo(u.id,q.id)!==null);
        if(!hayPronos) gruposFaltantes.push(`Grupo ${g}`);
      }
    });
    return `<div class="card mb-16" style="opacity:.75">
      ${cabecera}
      <div style="display:flex;align-items:center;justify-content:space-between;background:var(--azul);border-radius:9px;padding:14px 16px;border:1px solid var(--azul3);flex-wrap:wrap;gap:8px">
        <div style="font-size:.9rem;font-weight:700">${slot1Desc}</div>
        <div style="font-size:.75rem;color:var(--gris);font-weight:700">VS</div>
        <div style="font-size:.9rem;font-weight:700">${slot2Desc}</div>
      </div>
      <div class="alerta alerta-info mt-8" style="font-size:.76rem">
        ⏳ <strong>Equipos pendientes.</strong>
        ${gruposFaltantes.length>0
          ?`Completa pronósticos de: <strong>${gruposFaltantes.join(', ')}</strong>`
          :'Completa pronósticos de las rondas anteriores para habilitar este partido.'}
      </div>
    </div>`;
  }).join('');

  // ── Progreso del bracket ──────────────────────────────────────
  const totalElim=PARTIDOS_ELIMINATORIAS.length;
  const pronElim=Object.keys(db.pronosticosElim[u.id]||{}).length;
  const pctBracket=Math.round((pronElim/totalElim)*100);

  return bannerEstadoApuesta(u.id)+`${resumenGlobal}
  <div class="card">
    <div class="card-titulo" style="justify-content:space-between;flex-wrap:wrap;gap:5px">
      <span>🏆 Mi Bracket Eliminatorio</span>
      <span style="font-size:.72rem;color:var(--gris2);font-weight:400">${pronElim}/${totalElim} partidos (${pctBracket}%)</span>
    </div>
    <div class="alerta alerta-info mb-8" style="font-size:.78rem">
      Los equipos se auto-calculan según tus pronósticos de grupos y avanzan ronda a ronda. Selecciona marcador y ganador en cada partido para continuar.
    </div>
    <div class="tabs">${tabs}</div>
    ${partHTML||'<p class="text-gris">No hay partidos en esta fase</p>'}
  </div>`;
}

// Actualiza el highlight del ganador sin re-renderizar todo
function previewGanador(matchId, val) {
  document.querySelectorAll(`label:has(input[name="gan-${matchId}"])`).forEach(lbl=>{
    const isSelected=lbl.querySelector('input').value===val;
    lbl.style.borderColor=isSelected?'var(--exito)':'var(--azul3)';
    lbl.style.background=isSelected?'rgba(6,214,160,.08)':'transparent';
  });
}

function guardarElim(uid, matchId) {
  if (usuarioBloqueado(uid)) {
    mostrarAlerta(envioDe(uid)?'🔒 Tu apuesta ya fue enviada — no se puede modificar':'🔒 Las apuestas están cerradas','error');
    return;
  }
  const gl=document.getElementById(`el-${matchId}`)?.value||'0';
  const gv=document.getElementById(`ev-${matchId}`)?.value||'0';
  let gan=null;
  document.querySelectorAll(`input[name="gan-${matchId}"]`).forEach(r=>{if(r.checked)gan=r.value;});
  const l=parseInt(gl),v=parseInt(gv);
  if(isNaN(l)||isNaN(v)||l<0||v<0){mostrarAlerta('Ingresa marcadores válidos (números ≥ 0)','error');return;}
  let ganFinal=gan;
  if(l>v) ganFinal='local'; else if(v>l) ganFinal='visitante';
  else if(!ganFinal){mostrarAlerta('Con empate debes seleccionar el ganador por penales','error');return;}
  guardarPElim(uid,matchId,l,v,ganFinal);
  mostrarAlerta('✅ Pronóstico guardado — el bracket se actualizó','exito');
  setTimeout(()=>renderApp(),600);
}

// ENVÍO DEFINITIVO DE LA APUESTA — bloqueo + checksum + soporte
// ═══════════════════════════════════════════════════════════════
function podioPronosticado(uid) {
  return {
    campeon:    resolverGanador('M104',uid,false),
    subcampeon: resolverGanador('M104',uid,true),
    tercero:    resolverGanador('M103',uid,false),
    cuarto:     resolverGanador('M103',uid,true),
  };
}

// Valida que la predicción esté 100% completa antes de permitir el envío
function validarPrediccionCompleta(uid) {
  const errores=[];
  const faltanG=PARTIDOS_GRUPOS.filter(p=>!getPGrupo(uid,p.id));
  if(faltanG.length) errores.push(`Faltan ${faltanG.length} marcadores de fase de grupos`);
  const faltanE=PARTIDOS_ELIMINATORIAS.filter(p=>{const pr=getPElim(uid,p.id);return !pr||!pr.ganador;});
  if(faltanE.length) errores.push(`Faltan ${faltanE.length} partidos de eliminatorias (marcador y ganador)`);
  if(!errores.length){
    const pod=podioPronosticado(uid);
    if(!pod.campeon||!pod.subcampeon||!pod.tercero) errores.push('El bracket no resuelve campeón/subcampeón/tercero — revisa tus pronósticos');
  }
  return errores;
}

function enviarApuesta(uid) {
  if (apuestasCerradas()) { mostrarAlerta('🔒 Las apuestas cerraron el '+DEADLINE_TEXTO,'error'); return; }
  if (envioDe(uid)) { mostrarAlerta('Ya enviaste tu apuesta — está bloqueada','info'); return; }
  const errores=validarPrediccionCompleta(uid);
  if (errores.length) {
    mostrarModal(`<div class="modal-titulo">⚠️ Predicción incompleta</div>
      <p style="font-size:.85rem;color:var(--gris2);margin-bottom:8px">No se puede enviar una apuesta incompleta:</p>
      ${errores.map(e=>`<div class="alerta alerta-error" style="font-size:.8rem">❌ ${esc(e)}</div>`).join('')}
      <div class="modal-acciones"><button class="btn btn-gris" onclick="cerrarModal()">Entendido</button></div>`);
    return;
  }
  const pod=podioPronosticado(uid);
  const chk=checksumPrediccion(uid);
  mostrarModal(`<div class="modal-titulo">📤 Confirmar envío definitivo</div>
    <div class="alerta alerta-info" style="font-size:.8rem">Al enviar, tu apuesta queda <strong>BLOQUEADA</strong> y no podrás modificarla. Revisa el resumen:</div>
    <div style="background:var(--azul);border-radius:8px;padding:12px;font-size:.86rem;margin-bottom:10px">
      <div>🏆 Campeón: <strong>${eqL(pod.campeon)}</strong></div>
      <div>🥈 Subcampeón: <strong>${eqL(pod.subcampeon)}</strong></div>
      <div>🥉 Tercer puesto: <strong>${eqL(pod.tercero)}</strong></div>
      <div style="margin-top:7px;font-size:.76rem;color:var(--gris2)">✅ 72 marcadores de grupos · ✅ 32 partidos de eliminatorias</div>
      <div style="font-size:.72rem;color:var(--gris);margin-top:4px">Checksum de tu predicción: <code>${chk}</code></div>
    </div>
    <div class="modal-acciones">
      <button class="btn btn-gris" onclick="cerrarModal()">Volver a revisar</button>
      <button class="btn btn-dorado" onclick="confirmarEnvio('${uid}')">📤 Enviar y bloquear</button>
    </div>`);
}

function confirmarEnvio(uid) {
  if (apuestasCerradas()||envioDe(uid)) { cerrarModal(); renderApp(); return; }
  const chk=checksumPrediccion(uid);
  const id='PRED-'+chk+'-'+Date.now().toString(36).toUpperCase();
  db.envios[uid]={id,checksum:chk,locked:true,
    submittedAt:new Date().toISOString(),submittedAtBogota:ahoraBogota()};
  guardarDB(); cerrarModal();
  descargarSoporte(uid);
  mostrarAlerta('✅ Apuesta enviada y bloqueada. Se descargó tu soporte.','exito');
  renderApp();
}

function descargarSoporte(uid) {
  const part=db.participantes.find(p=>p.id===uid);

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});

  a.click(); URL.revokeObjectURL(url);
}

function doAdminLogin() {
  const pin=document.getElementById('aPIN')?.value;
  if(pin===(db.config?.adminPin||'2026')){ST.adminOk=true;ST.tab='grupos';renderApp();}
  else document.getElementById('aAlert').innerHTML='<div class="alerta alerta-error">❌ PIN incorrecto</div>';
}

function adminGuardar(matchId) {
  const l=parseInt(document.getElementById(`arl-${matchId}`)?.value);
  const v=parseInt(document.getElementById(`arv-${matchId}`)?.value);
  if(isNaN(l)||isNaN(v)||l<0||v<0){mostrarAlerta('Resultado inválido','error');return;}
  const esElim=PARTIDOS_ELIMINATORIAS.some(p=>p.id===matchId);
  let gan=l>v?'local':l<v?'visitante':'empate';
  if(esElim&&gan==='empate'){
    // En eliminatorias el empate exige ganador por penales
    const pen=document.getElementById(`agp-${matchId}`)?.value;
    if(!pen){mostrarAlerta('⚠️ Empate en eliminatoria: selecciona el ganador por penales','error');return;}
    gan=pen;
  }
  db.resultadosReales[matchId]={local:l,visitante:v,ganador:gan,status:'final',
    updatedAt:new Date().toISOString()};
  [...PARTIDOS_GRUPOS,...PARTIDOS_ELIMINATORIAS].filter(p=>p.id===matchId).forEach(p=>p.estado='jugado');
  guardarDB(); recalcularPuntajes();
  mostrarAlerta(`✅ Resultado guardado: ${l} - ${v}${gan!=='empate'?' → Gana '+gan:' (empate)'}`, 'exito');
  renderApp();
}

function adminBloquear(matchId) {
  const p=[...PARTIDOS_GRUPOS,...PARTIDOS_ELIMINATORIAS].find(p=>p.id===matchId);
  if(!p) return;
  p.estado=p.estado==='bloqueado'?'pendiente':'bloqueado';
  guardarDB();
  mostrarAlerta(p.estado==='bloqueado'?'🔒 Partido bloqueado':'🔓 Partido desbloqueado','info');
  renderApp();
}

function adminBloquearTodos() {
  [...PARTIDOS_GRUPOS,...PARTIDOS_ELIMINATORIAS].forEach(p=>{if(!db.resultadosReales[p.id])p.estado='bloqueado';});
  guardarDB(); mostrarAlerta('🔒 Todos los partidos bloqueados','info'); renderApp();
}

function adminReiniciar() {
  if(!confirm('⚠️ Primera confirmación: ¿Reiniciar TODOS los datos?')) return;
  if(!confirm('🚨 Segunda confirmación: Esto borrará participantes, pronósticos y resultados. ¿Continuar?')) return;
  localStorage.removeItem('polla26'); localStorage.removeItem('polla26session'); location.reload();
}

// ── Importar respaldo JSON de un apostador (consolidación admin) ─
// La app vive en localStorage de cada dispositivo: este import permite
// al admin reunir las apuestas de todos en su propio equipo.
function adminImportarJSON() {
  const input=document.createElement('input');
  input.type='file'; input.accept='.json,application/json'; input.multiple=true;
  input.onchange=async ()=>{
    let ok=0,fail=0;
    for(const file of input.files){
      try{
        const data=JSON.parse(await file.text());
        if(data.tipo!=='respaldo-polla26'||!data.participante?.id) throw new Error('formato');
        // Verificar integridad con el checksum incluido
        const chk=checksumStr(JSON.stringify({g:data.pronosticosGrupos||{},e:data.pronosticosElim||{}}));
        if(data.checksum&&chk!==data.checksum) throw new Error('checksum no coincide — archivo alterado');
        const p=data.participante;
        const idx=db.participantes.findIndex(x=>x.id===p.id);
        if(idx>=0) db.participantes[idx]=p; else db.participantes.push(p);
        db.pronosticosGrupos[p.id]=data.pronosticosGrupos||{};
        db.pronosticosElim[p.id]=data.pronosticosElim||{};
        if(data.envio) db.envios[p.id]=data.envio;
        ok++;
      }catch(e){ console.error('Import error',file.name,e); fail++; }
    }
    guardarDB(); recalcularPuntajes(); renderApp();
    mostrarAlerta(`📂 Importados: ${ok} · Fallidos: ${fail}`, fail?'error':'exito');
  };
  input.click();
}

// ═══════════════════════════════════════════════════════════════
// VALIDACIÓN AUTOMÁTICA DE DATOS FIFA + SELF-TESTS
// ═══════════════════════════════════════════════════════════════
function validarDatosFIFA() {
  const errores=[];
  const grupos=Object.keys(GRUPOS);
  if(grupos.length!==12) errores.push(`Grupos: ${grupos.length} ≠ 12`);
  const equipos=grupos.flatMap(g=>GRUPOS[g].equipos);
  if(equipos.length!==48) errores.push(`Equipos: ${equipos.length} ≠ 48`);
  if(new Set(equipos).size!==equipos.length) errores.push('Hay equipos duplicados entre grupos');
  grupos.forEach(g=>{if(GRUPOS[g].equipos.length!==4)errores.push(`Grupo ${g}: ${GRUPOS[g].equipos.length} equipos ≠ 4`);});
  if(PARTIDOS_GRUPOS.length!==72) errores.push(`Partidos de grupos: ${PARTIDOS_GRUPOS.length} ≠ 72`);
  if(PARTIDOS_ELIMINATORIAS.length!==32) errores.push(`Partidos eliminatorias: ${PARTIDOS_ELIMINATORIAS.length} ≠ 32`);
  if(PARTIDOS_GRUPOS.length+PARTIDOS_ELIMINATORIAS.length!==104) errores.push('Total partidos ≠ 104');
  // Cada equipo juega exactamente 3 partidos de grupo
  const cuenta={};
  PARTIDOS_GRUPOS.forEach(p=>{
    cuenta[p.equipoLocal]=(cuenta[p.equipoLocal]||0)+1;
    cuenta[p.equipoVisitante]=(cuenta[p.equipoVisitante]||0)+1;
    if(!GRUPOS[p.grupo].equipos.includes(p.equipoLocal)) errores.push(`${p.id}: ${p.equipoLocal} no es del grupo ${p.grupo}`);
    if(!GRUPOS[p.grupo].equipos.includes(p.equipoVisitante)) errores.push(`${p.id}: ${p.equipoVisitante} no es del grupo ${p.grupo}`);
    if(isNaN(new Date(p.fecha).getTime())) errores.push(`${p.id}: fecha inválida ${p.fecha}`);
  });
  equipos.forEach(e=>{if(cuenta[e]!==3)errores.push(`${e} juega ${cuenta[e]||0} partidos ≠ 3`);});
  // IDs únicos y números FIFA 73-104
  const ids=[...PARTIDOS_GRUPOS,...PARTIDOS_ELIMINATORIAS].map(p=>p.id);
  if(new Set(ids).size!==ids.length) errores.push('IDs de partido duplicados');
  const nums=PARTIDOS_ELIMINATORIAS.map(p=>p.num).sort((a,b)=>a-b);
  if(nums[0]!==73||nums[31]!==104||new Set(nums).size!==32) errores.push('Numeración eliminatorias ≠ 73-104');
  // Banderas para los 48
  equipos.forEach(e=>{if(!BANDERAS[e])errores.push(`Falta bandera de ${e}`);});
  return errores;
}

function runSelfTests() {
  const t=[]; const chk=(nombre,cond,detalle='')=>t.push({nombre,ok:!!cond,detalle});
  // Datos FIFA
  const errFIFA=validarDatosFIFA();
  chk('Datos FIFA válidos (12/48/72/32/104)',errFIFA.length===0,errFIFA.join('; '));
  // Usuario sintético para pruebas (se elimina al final, sin persistir)
  const TU='__TEST__';
  db.pronosticosGrupos[TU]={};
  try {
    // Grupo A: México gana todo, Sudáfrica 2°, Corea 3°, Checa última
    const pa=PARTIDOS_GRUPOS.filter(p=>p.grupo==='A');
    const marcador={'México':3,'Sudáfrica':2,'Corea del Sur':1,'Rep. Checa':0};
    pa.forEach(p=>{db.pronosticosGrupos[TU][p.id]={local:marcador[p.equipoLocal],visitante:marcador[p.equipoVisitante]};});
    const tabla=calcTablaGrupo(TU,'A');
    chk('Tabla de grupo ordena por puntos',tabla[0].e==='México'&&tabla[3].e==='Rep. Checa',
      tabla.map(x=>x.e+':'+x.pts).join(', '));
    // Desempate head-to-head: B con todos empatados 1-1 excepto Canadá 1-0 a Suiza
    db.pronosticosGrupos[TU]={};
    PARTIDOS_GRUPOS.filter(p=>p.grupo==='B').forEach(p=>{
      const cs=(p.equipoLocal==='Canadá'&&p.equipoVisitante==='Suiza'),
            sc=(p.equipoLocal==='Suiza'&&p.equipoVisitante==='Canadá');
      db.pronosticosGrupos[TU][p.id]=cs?{local:1,visitante:0}:sc?{local:0,visitante:1}:{local:1,visitante:1};
    });
    const tb=calcTablaGrupo(TU,'B');
    chk('Desempate por enfrentamiento directo (Canadá > Suiza)',
      tb.findIndex(x=>x.e==='Canadá')<tb.findIndex(x=>x.e==='Suiza'),
      tb.map(x=>x.e+':'+x.pts).join(', '));
    // Clasificados: grupo sin pronósticos devuelve null
    const clas=calcClasificados(TU);
    chk('Grupo sin pronósticos no clasifica a nadie',clas.primeros['C']===null&&clas.segundos['C']===null);
    // Terceros: con solo 2 grupos pronosticados no hay 8 terceros → bracket de terceros pendiente
    chk('Sin 8 terceros la asignación es null',asignarTerceros(clas.mejoresTerceros)===null);
    // Asignación de terceros con 8 grupos válidos
    const fake=['A','B','C','D','E','F','G','H'].map(g=>({e:GRUPOS[g].equipos[2],grupo:g,pts:0,dg:0,gf:0}));
    const asig=asignarTerceros(fake);
    chk('Asignación Anexo C respeta restricciones',!!asig&&Object.entries(asig).every(([mid,eq])=>{
      const m=PARTIDOS_ELIMINATORIAS.find(p=>p.id===mid);
      const grupoDe=Object.keys(GRUPOS).find(g=>GRUPOS[g].equipos.includes(eq));
      return m.slot2.slice(2).includes(grupoDe);
    }),JSON.stringify(asig));
    // Deadline
    chk('Deadline configurado 11-jun-2026 13:00 -05:00',
      BETTING_DEADLINE.toISOString()==='2026-06-11T18:00:00.000Z');
    // Checksum estable
    chk('Checksum determinista',checksumPrediccion(TU)===checksumPrediccion(TU));
    // Puntaje: marcador exacto vs resultado
    const cfg=db.config?.puntajes||CFG_DEFAULT.puntajes;
    chk('Config puntajes completa',['marcadorExacto','resultadoCorrecto','diferenciaGol','clasificadoGrupos',
      'avanceDieciseisavos','avanceOctavos','avanceCuartos','avanceSemis','campeon','subcampeon','tercerPuesto']
      .every(k=>typeof cfg[k]==='number'));
  } finally {
    delete db.pronosticosGrupos[TU]; delete db.pronosticosElim[TU];
  }
  return t;
}

function modalDiagnostico() {
  const errFIFA=validarDatosFIFA();
  const tests=runSelfTests();
  const okAll=tests.every(x=>x.ok)&&errFIFA.length===0;
  mostrarModal(`<div class="modal-titulo">🩺 Diagnóstico del sistema</div>
    <div class="alerta ${okAll?'alerta-exito':'alerta-error'}" style="font-size:.8rem">
      ${okAll?'✅ Todos los chequeos pasaron':'❌ Hay chequeos fallidos — revisar'}</div>
    <div style="font-size:.78rem;max-height:50vh;overflow-y:auto">
      ${tests.map(x=>`<div style="padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)">
        ${x.ok?'✅':'❌'} ${esc(x.nombre)}
        ${!x.ok&&x.detalle?`<div style="color:var(--gris);font-size:.7rem">${esc(x.detalle)}</div>`:''}
      </div>`).join('')}
      ${errFIFA.map(e=>`<div style="color:var(--rojo);padding:4px 0">❌ ${esc(e)}</div>`).join('')}
    </div>
    <div class="modal-acciones"><button class="btn btn-gris" onclick="cerrarModal()">Cerrar</button></div>`);
}

function dlCSV(data,fname) {
  const csv=data.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=fname; a.click(); URL.revokeObjectURL(url);
}

// UTILIDADES
// ═══════════════════════════════════════════════════════════════
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtF(iso){if(!iso)return'';const[,m,d]=iso.split('-');return`${d}/${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(m)-1]}`;}
function fmtFH(iso){try{return new Date(iso).toLocaleDateString('es',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}
function nomF(f){return{grupos:'Grupos',dieciseisavos:'16avos',octavos:'Octavos',cuartos:'Cuartos',semifinal:'Semis',tercerPuesto:'3er Puesto',final:'Final'}[f]||f;}

function mostrarAlerta(msg,tipo='info') {
  const old=document.getElementById('alertaF'); if(old) old.remove();
  const div=document.createElement('div'); div.id='alertaF';
  div.style.cssText='position:fixed;top:65px;right:12px;z-index:9999;max-width:290px;animation:fadeIn .25s ease';
  div.innerHTML=`<div class="alerta alerta-${tipo}">${msg}</div>`;
  document.body.appendChild(div); setTimeout(()=>div.remove(),2800);
}

function mostrarModal(html) {
  document.getElementById('modalContainer').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)cerrarModal()"><div class="modal">${html}</div></div>`;}
function cerrarModal(){document.getElementById('modalContainer').innerHTML='';}
